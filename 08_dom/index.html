<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>08_dom</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 class="title">08_DOM</h1>
      <h2 class="dupla" id="exemplo">Gustavo e Nicole</h2>
      <button onclick="mudaTexto()">Clique aqui</button>
    </header>

    <section>
      <h4>Qual meu nome do meio?</h4>
      <select id="selecao">
        <option value="">Selecione</option>
        <option value="gustavo">Gustavo</option>
        <option value="henrique">Henrique</option>
        <option value="rapouso">Rapouso</option>
      </select>
      <p id="mensagem_selecao"></p>
    </section>

    <section>
      <input type="checkbox" id="termo" />Confirme aqui se o Gustavo é lindo.
      <br>
      <br>
      <button id="submit">Concluir</button>
      <p id="mensagem_fim"></p>
    </section>

    <section>
      <h3>Liste adjetivos de Gustavo:</h3>
      <input type="text" id="adjetivos">
      <ul id="listaAdjetivos"></ul>
    </section>

    <script>
      const texto1 = document.getElementById("exemplo");
      const termos = document.getElementById("termo");
      const selecao = document.getElementById("selecao");
      const mensagem_selecao = document.getElementById("mensagem_selecao");
      const mensagem_fim = document.getElementById("mensagem_fim");
      const submit_botao = document.getElementById("submit");
      const adjetivosGustavo = document.querySelector("#adjetivos");
      const lista = document.getElementById("listaAdjetivos");

      function mudaTexto() {
        texto1.textContent = "Nicole e Gustavo";
      }

      selecao.addEventListener("change", function () {
        const valor = selecao.value;

        if (valor === "gustavo") {
          mensagem_selecao.textContent = "Esse é meu primeiro nome.";
        } else if (valor === "rapouso") {
          mensagem_selecao.textContent = "Esse é meu último nome.";
        } else if (valor === "henrique") {
          mensagem_selecao.textContent = "Acertou.";
        } else {
          mensagem_selecao.textContent = "";
        }
      });

      submit_botao.addEventListener("click", function () {
        if (termos.checked) {
          mensagem_fim.textContent = "Obrigado por reconhecer a beleza do Gustavo!";
          mensagem_fim.style.color = "green";
        } else {
          mensagem_fim.textContent = "Você precisa admitir que o Gustavo é lindo para concluir.";
          mensagem_fim.style.color = "red";
        }
      });

      adjetivosGustavo.addEventListener("keypress", function(event){
        
        if(event.key === "Enter"){
          const newAdjetivo = document.createElement("li");
          newAdjetivo.textContent = adjetivosGustavo.value;
          newAdjetivo.classList.add("item-lista");
          lista.appendChild(newAdjetivo);
          adjetivosGustavo.value = "";
        }
        
      });
    </script>
  </body>
</html>
